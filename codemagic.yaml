workflows:
  flutter-ios:
    name: Flutter iOS
    environment:
      flutter: stable
      xcode: latest

    scripts:
      - name: Clean
        script: flutter clean

      - name: Get dependencies
        script: flutter pub get

      - name: Generate Flutter iOS config
        script: flutter build ios --release --no-codesign --config-only

      - name: Build unsigned .app via xcodebuild
        script: |
          cd ios
          xcodebuild \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ../build/ios_build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            build

      - name: Package IPA
        script: |
          mkdir -p build/ios/iphoneos/Payload
          cp -r build/ios_build/Build/Products/Release-iphoneos/Runner.app build/ios/iphoneos/Payload/
          cd build/ios/iphoneos
          zip -r app.ipa Payload/

    artifacts:
      - build/ios/iphoneos/app.ipa