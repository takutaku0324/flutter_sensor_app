workflows:
  flutter-ios:
    name: Flutter iOS
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Get dependencies
        script: flutter packages pub get

      - name: Build iOS (generates Podfile)
        script: flutter build ios --release --no-codesign

      - name: Pod install
        script: |
          cd ios
          pod repo update
          pod install

    artifacts:
      - build/ios/iphoneos/Runner.app