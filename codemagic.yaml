workflows:
  flutter-ios:
    name: Flutter iOS
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Get dependencies
        script: flutter packages pub get

      - name: Set up CocoaPods
        script: |
          cd ios
          pod repo update
          pod install --deployment

      - name: Build iOS
        script: |
          flutter build ios \
            --release \
            --no-codesign \
            --scheme Runner        # ← 明示的に指定

    artifacts:
      - build/ios/iphoneos/Runner.app   # ← .ipaではなく.appで一旦確認